version: '3.8'

services:
  db:
    image: postgres:15
    container_name: shs_academic_db_v2
    restart: unless-stopped
    environment:
      POSTGRES_DB: shs_academic
      POSTGRES_USER: shs_admin
      POSTGRES_PASSWORD: shs_password_2024
    ports:
      - "5435:5432"
    volumes:
      - shs_db_data:/var/lib/postgresql/data
    networks:
      - shs_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: shs_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@shs.edu.gh
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - shs_network

volumes:
  shs_db_data:
    name: shs_db_data

networks:
  shs_network:
    driver: bridge

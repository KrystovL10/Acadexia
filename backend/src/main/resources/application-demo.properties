# Demo Profile Configuration
# Inherits from base application.properties + applies demo overrides
# Activate with: spring.profiles.active=demo
# Or run: mvn spring-boot:run -Dspring-boot.run.profiles=demo

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/shs_academic}
spring.datasource.username=${DB_USERNAME:shs_admin}
spring.datasource.password=${DB_PASSWORD:shs_password_2024}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:demo_jwt_secret_key_for_testing_only_256_bit_minimum_ok}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Google Gemini AI (optional override for demo)
gemini.api.key=${GEMINI_API_KEY:}

cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Logging — INFO level for cleaner demo output
logging.level.com.shs.academic=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/shs_academic}
spring.datasource.username=${DB_USERNAME:shs_admin}
spring.datasource.password=${DB_PASSWORD:shs_password_2024}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:GES_SHS_ACADEMIC_SYSTEM_JWT_SECRET_KEY_2024_VERY_LONG_AND_SECURE}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Application
app.name=GES SHS Academic System
spring.profiles.active=${APP_ENV:dev}

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Mail (configure for your SMTP provider)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cache
spring.cache.type=simple
spring.cache.cache-names=dashboardStats,termComparison,gradeDistribution,classPerformance,subjectWeakness,enrollmentTrends,powerRanking,schoolInsights,classInsights,waecReadiness,studentInsights

# Claude AI (Anthropic)
anthropic.api.key=${CLAUDE_API_KEY:}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.model=claude-opus-4-5
anthropic.api.max-tokens=1500
anthropic.api.version=2023-06-01

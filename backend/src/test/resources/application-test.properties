# ── H2 In-Memory Database for Integration Tests ──
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT
jwt.secret=test_jwt_secret_key_for_integration_tests_must_be_at_least_256_bits_long_enough
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS
cors.allowed-origins=http://localhost:5173

# Mail (disabled for tests)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# Cache (disabled for tests)
spring.cache.type=none

# Claude AI (disabled for tests)
anthropic.api.key=test-key
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.api.model=claude-opus-4-5
anthropic.api.max-tokens=100
anthropic.api.version=2023-06-01

# Logging (minimal for tests)
logging.level.com.shs.academic=WARN
logging.level.org.hibernate.SQL=WARN
